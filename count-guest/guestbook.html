<!--
  ============================================================
  RETRO GUESTBOOK  —  Windows 98 / Netscape Navigator era
  ============================================================
  SETUP:
  1. Same jsonbin.io account as the counter
  2. New SECOND bin → content:  { "entries": [] }
  3. Replace YOUR_API_KEY and YOUR_GUESTBOOK_BIN_ID below
  ============================================================
-->

<!-- Paste inside <head> or your stylesheet -->
<style>
  /* ── Win98 system defaults ── */
  .gb-page {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: #000000;
    background: #ffffff;
    max-width: 560px;
    margin: 0 auto;
  }

  /* Page title — big bold serif like Netscape rendered H1 */
  .gb-page h1 {
    font-family: "Times New Roman", Times, serif;
    font-size: 24px;
    font-weight: bold;
    color: #000000;
    margin: 0 0 6px 0;
    border-bottom: 1px solid #000000;
    padding-bottom: 4px;
  }

  .gb-intro {
    font-size: 12px;
    margin: 6px 0 14px;
    color: #000000;
  }

  /* ── Win98 horizontal rule ── */
  .gb-hr {
    border: none;
    border-top: 1px solid #808080;
    border-bottom: 1px solid #ffffff;
    margin: 10px 0;
  }

  /* ── Form table layout (classic CGI form style) ── */
  .gb-form-table {
    border-collapse: collapse;
    width: 100%;
  }

  .gb-form-table td {
    padding: 2px 4px;
    vertical-align: middle;
    font-size: 12px;
  }

  .gb-form-table td:first-child {
    white-space: nowrap;
    text-align: right;
    width: 80px;
  }

  /* Win98 sunken text input */
  .gb-input {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: #000000;
    background: #ffffff;
    border-top:    2px solid #808080;
    border-left:   2px solid #808080;
    border-bottom: 2px solid #dfdfdf;
    border-right:  2px solid #dfdfdf;
    padding: 1px 3px;
    outline: none;
  }

  .gb-input-name { width: 200px; }

  /* Win98 sunken textarea */
  .gb-textarea {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: #000000;
    background: #ffffff;
    border-top:    2px solid #808080;
    border-left:   2px solid #808080;
    border-bottom: 2px solid #dfdfdf;
    border-right:  2px solid #dfdfdf;
    padding: 2px 3px;
    width: 380px;
    height: 80px;
    resize: none;
    outline: none;
  }

  /* Win98 raised button */
  .gb-btn {
    font-family: Arial, sans-serif;
    font-size: 12px;
    background: #c0c0c0;
    border-top:    2px solid #ffffff;
    border-left:   2px solid #ffffff;
    border-bottom: 2px solid #808080;
    border-right:  2px solid #808080;
    padding: 2px 12px;
    cursor: pointer;
    color: #000000;
    min-width: 80px;
  }

  .gb-btn:active {
    border-top:    2px solid #808080;
    border-left:   2px solid #808080;
    border-bottom: 2px solid #ffffff;
    border-right:  2px solid #ffffff;
  }

  .gb-btn-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
  }

  .gb-status {
    font-size: 11px;
    color: #000080;
  }

  /* ── Footer links (classic underlined blue) ── */
  .gb-footer {
    margin-top: 10px;
    font-size: 12px;
  }

  .gb-footer a {
    color: #0000cc;
    text-decoration: underline;
  }

  /* ── Entry list ── */
  .gb-entries-section h2 {
    font-family: "Times New Roman", Times, serif;
    font-size: 20px;
    font-weight: bold;
    border-bottom: 1px solid #000;
    padding-bottom: 2px;
    margin: 18px 0 8px;
  }

  .gb-entry {
    border: 1px solid #808080;
    background: #f0f0f0;
    padding: 6px 10px;
    margin-bottom: 8px;
    font-size: 12px;
  }

  .gb-entry-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .gb-entry-name {
    font-weight: bold;
    color: #000080;
  }

  .gb-entry-date {
    margin-left: auto;
    color: #666666;
    font-style: italic;
    font-size: 11px;
  }

  .gb-entry-message {
    color: #000000;
    white-space: pre-wrap;
    font-size: 12px;
  }

  .gb-no-entries {
    font-size: 12px;
    color: #444;
    font-style: italic;
  }

  .gb-loading-msg {
    font-size: 12px;
    color: #444;
    font-style: italic;
  }
</style>

<!-- ═══════════════════════════════════════════════════════════
     SIGN FORM — paste where you want the sign page to appear
     ═══════════════════════════════════════════════════════════ -->
<div class="gb-page" id="gb-sign-section">

  <h1>Add to the Guestbook</h1>

  <p class="gb-intro">
    Fill in the blanks below to add to my guestbook, Thanks!
  </p>

  <hr class="gb-hr">

  <table class="gb-form-table">
    <tr>
      <td>Your Name:</td>
      <td><input class="gb-input gb-input-name"    id="gb-name"    type="text" maxlength="60"></td>
    </tr>
    <tr>
      <td style="vertical-align:top; padding-top:4px;">Comments:</td>
      <td><textarea class="gb-textarea" id="gb-message" maxlength="500"></textarea></td>
    </tr>
  </table>

  <div class="gb-btn-row">
    <button class="gb-btn" onclick="gbSubmit()">Submit Query</button>
    <button class="gb-btn" onclick="gbReset()">Reset</button>
    <span class="gb-status" id="gb-status"></span>
  </div>

  <hr class="gb-hr">

  <div class="gb-footer">
    <div>* <a href="#gb-entries-section" onclick="document.getElementById('gb-entries-section').scrollIntoView()">Back to the Guestbook Entries</a></div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════════
     ENTRIES LIST — paste where you want entries displayed
     Can be on the same page or a separate page
     ═══════════════════════════════════════════════════════════ -->
<div class="gb-page gb-entries-section" id="gb-entries-section">
  <h2>Guestbook Entries</h2>
  <div id="gb-entries-list"><div class="gb-loading-msg">Loading entries...</div></div>
</div>

<!-- Paste just before </body> -->
<script>
(function () {
  // ── Configure ──────────────────────────────────────────────
  var API_KEY = "$2a$10$mm0TUo8g07gXpqvqniM6R.GhJxad4Hv85MQrRwl/nCLY/KQvJrA0G";              // jsonbin.io Master Key
  var BIN_ID  = "69c59162c3097a1dd563731e";    // bin ID for guestbook
  var MAX_ENTRIES = 50;
  // ──────────────────────────────────────────────────────────

  var BASE    = "https://api.jsonbin.io/v3/b/" + BIN_ID;
  var HEADERS = { "Content-Type": "application/json", "X-Master-Key": API_KEY };

  function esc(s) {
    return String(s)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  function setStatus(msg, err) {
    var el = document.getElementById("gb-status");
    el.innerHTML  = msg;
    el.style.color = err ? "#cc0000" : "#000080";
  }

  function renderEntries(entries) {
    var container = document.getElementById("gb-entries-list");
    if (!entries || entries.length === 0) {
      container.innerHTML = '<div class="gb-no-entries">No entries yet. Be the first to sign!</div>';
      return;
    }
    var shown = entries.slice().reverse().slice(0, MAX_ENTRIES);
    container.innerHTML = shown.map(function(e) {
      return [
        '<div class="gb-entry">',
        '  <div class="gb-entry-row">',
        '    <span class="gb-entry-name">' + esc(e.name) + '</span>',
        '    <span class="gb-entry-date">' + esc(e.date) + '</span>',
        '  </div>',
        '  <div class="gb-entry-message">' + esc(e.message) + '</div>',
        '</div>'
      ].join("");
    }).join("");
  }

  async function gbLoad() {
    try {
      var r = await fetch(BASE + "/latest", { headers: HEADERS });
      var d = await r.json();
      renderEntries(d.record.entries || []);
    } catch(e) {
      document.getElementById("gb-entries-list").innerHTML =
        '<div class="gb-no-entries" style="color:#c00">Could not load entries. Check your API key and bin ID.</div>';
    }
  }

  window.gbReset = function() {
    document.getElementById("gb-name").value    = "";
    document.getElementById("gb-message").value = "";
    setStatus("", false);
  };

  window.gbSubmit = async function() {
    var name    = (document.getElementById("gb-name").value    || "").trim();
    var message = (document.getElementById("gb-message").value || "").trim();

    if (!name)    { setStatus("Please enter your name.", true);    return; }
    if (!message) { setStatus("Please enter a comment.", true);    return; }

    var btns = document.querySelectorAll(".gb-btn");
    btns.forEach(function(b) { b.disabled = true; });
    setStatus("Submitting...", false);

    try {
      var r = await fetch(BASE + "/latest", { headers: HEADERS });
      var d = await r.json();
      var entries = d.record.entries || [];

      var now = new Date();
      var dateStr = now.toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });

      entries.push({ name: name, message: message, date: dateStr });

      var pw = await fetch(BASE, {
        method: "PUT",
        headers: HEADERS,
        body: JSON.stringify({ entries: entries })
      });
      if (!pw.ok) throw new Error("write failed");

      gbReset();
      setStatus("Thank you for signing the guestbook!", false);
      renderEntries(entries);
    } catch(e) {
      setStatus("Error saving entry. Please try again.", true);
    } finally {
      btns.forEach(function(b) { b.disabled = false; });
    }
  };

  gbLoad();
})();
</script>
